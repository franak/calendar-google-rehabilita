<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario público AVM146 Rehabilitación</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Estilos propios por encima de Bootstrap -->
  <link rel="stylesheet" href="styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="container-fluid d-flex align-items-center justify-content-between">
        <div class="app-header-left d-flex align-items-center gap-3">
          <button id="sidebarToggle" class="btn btn-link text-white d-md-none">
            <i class="bi bi-list fs-3"></i>
          </button>
          <img id="env-header-logo" alt="Logo Entorno" />
          <div class="app-logo">
            <h1 class="app-title">AVM146</h1>
            <p class="app-subtitle">Rehabilitación</p>
          </div>
        </div>

        <div class="app-header-right d-flex align-items-center gap-4">
          <div id="userProfile" class="user-profile d-none align-items-center gap-2">
            <span id="userName" class="user-name text-dark small fw-bold"></span>
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-primary dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                <img id="nav-user-avatar" src="" class="user-avatar-sm d-none" alt="Avatar" />
                Mi Perfil
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#" onclick="setView(VIEW_ACCOUNT_EDIT)"><i class="bi bi-person-circle me-2"></i>Ver Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
              </ul>
            </div>
          </div>
          <button id="adminLoginBtn" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#adminLoginModal">
            <i class="bi bi-person-fill me-1"></i>Iniciar Sesión
          </button>
        </div>
      </div>
    </header>

    <div class="app-body">
      <aside id="appSidebar" class="app-sidebar">
        <nav class="sidebar-nav">
          <div class="sidebar-section">
            <h6 class="sidebar-title">NAVIGATIONS</h6>
            <ul class="nav flex-column" id="sidebarNav">
              <li class="nav-item">
                <a href="#" class="nav-link active" id="navCalendar">
                  <i class="bi bi-calendar3"></i>
                  <span>Calendario</span>
                </a>
              </li>
              <!-- Dinámico (Dashboard, Suscripciones, Usuarios, Auditoría) -->
            </ul>
          </div>

          <!-- Controles específicos de Calendario -->
          <div id="calendarControls" class="sidebar-section border-top">
            <h6 class="sidebar-title">Vista de Calendario</h6>
            <div class="px-3 mb-3">
              <div class="view-switcher-sidebar d-flex flex-column gap-1">
                <button class="view-button btn btn-sm text-start" data-view="list"><i class="bi bi-list-ul me-2"></i>Lista</button>
                <button class="view-button is-active btn btn-sm text-start" data-view="month"><i class="bi bi-grid-3x3 me-2"></i>Mes</button>
                <button class="view-button btn btn-sm text-start" data-view="timeline"><i class="bi bi-reception-1 me-2"></i>Timeline</button>
                <button class="view-button btn btn-sm text-start" data-view="gantt"><i class="bi bi-bar-chart-steps me-2"></i>Gantt</button>
              </div>
            </div>
            <h6 class="sidebar-title">Búsqueda y Filtros</h6>
            <div class="px-3">
              <input id="searchInput" type="search" class="form-control form-control-sm mb-3" placeholder="Buscar eventos...">
              <div id="sourceFilters" class="source-filters-list d-flex flex-column gap-2">
                <!-- Dinámico -->
              </div>
            </div>
          </div>
        </nav>
      </aside>

      <div class="app-content">
        <section class="status-bar" aria-live="polite">
          <div class="container-fluid d-flex align-items-center justify-content-between">
            <div id="statusMessage" class="status-message"></div>
            <div class="d-flex align-items-center gap-2">
              <button id="goTodayBtn" class="btn btn-xs btn-outline-primary" title="Ir a hoy">Hoy</button>
              <button id="forceSyncBtn" class="btn btn-xs btn-outline-secondary"><i class="bi bi-arrow-repeat"></i></button>
              <div id="loader" class="loader hidden">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
        </section>

        <main class="app-main">
          <div id="viewContainer" class="view-container">
            <!-- Vistas -->
          </div>
        </main>
      </div>
    </div>

    <footer class="app-footer text-center py-3">
      <div class="container-fluid text-muted small">
        <span>&copy; 2026 AVM146 Rehabilitación - Fuente: Google Calendar</span>
      </div>
    </footer>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <!-- Admin Login Modal -->
  <div class="modal fade" id="adminLoginModal" tabindex="-1" aria-labelledby="adminLoginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-bg-light">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="adminLoginModalLabel">Acceso Administrador</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="adminLoginError" class="alert alert-danger d-none py-2 px-3 small" role="alert"></div>
          <form id="adminLoginForm">
            <div class="mb-3">
              <label for="adminUsername" class="form-label visually-hidden">Usuario</label>
              <input type="text" class="form-control" id="adminUsername" placeholder="Usuario" required>
            </div>
            <div class="mb-3">
              <label for="adminPassword" class="form-label visually-hidden">Contraseña</label>
              <input type="password" class="form-control" id="adminPassword" placeholder="Contraseña" required>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-warning" id="adminSubmitBtn">
                Iniciar sesión
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="toast-container" class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 10000; pointer-events: none;"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
